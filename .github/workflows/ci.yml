name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  quality:
    name: Lint, typecheck, build, and test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: offline_field_ops
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d offline_field_ops"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/offline_field_ops
      JWT_SECRET: test-secret-change-me
      CLIENT_ORIGIN: http://localhost:5173
      VITE_API_BASE_URL: http://localhost:3000/api

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install client dependencies
        run: npm ci
        working-directory: client

      - name: Install server dependencies
        run: npm ci
        working-directory: server

      - name: Generate Prisma client
        run: npx prisma generate
        working-directory: server

      - name: Run Prisma migrations
        run: npx prisma migrate deploy
        working-directory: server

      - name: Seed database
        run: npm run db:seed
        working-directory: server

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Test
        run: npm test
